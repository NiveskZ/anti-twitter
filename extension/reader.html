<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Leitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f4f0; height: 100vh; display: flex; flex-direction: column; }

    .barra {
      background: #1a1a18;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .barra h1 { font-size: 0.95rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .progresso-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: #bbb;
      flex-shrink: 0;
    }
    .progresso-textos {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .barra-progresso {
      width: 100px;
      height: 4px;
      background: #444;
      border-radius: 2px;
      overflow: hidden;
    }
    .barra-progresso-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 2px;
      transition: width 0.3s;
    }
    #detalheProgresso {
      font-size: 0.72rem;
      color: #8f8f8f;
      min-height: 1em;
    }
    #indicadorContagem {
      font-size: 0.72rem;
      color: #d7d7d7;
      min-height: 1em;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #indicadorContagem.visivel { opacity: 1; }

    #btnConcluirReader {
      padding: 6px 14px;
      background: #2d7a2d;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }
    #btnConcluirReader:disabled { background: #555; cursor: not-allowed; }

    .acoes-pdf {
      display: none;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .acoes-pdf button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #textoZoomPDF {
      min-width: 46px;
      text-align: center;
      font-size: 0.78rem;
      color: #d7d7d7;
    }

    #areaLivro {
      flex: 1;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    #viewerEpub {
      width: 100%;
      height: 100%;
    }

    .nav-epub {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.2);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      padding: 14px 10px;
      cursor: pointer;
      border-radius: 4px;
      z-index: 10;
      line-height: 1;
    }
    .nav-epub:hover { background: rgba(0,0,0,0.4); }
    #btnAnterior { left: 4px; }
    #btnProximo  { right: 4px; }

    #viewerPDF {
      width: 100%;
      height: 100%;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 16px;
      gap: 12px;
    }
    .pagina-pdf {
      width: fit-content;
      margin: 0 auto;
    }
    .pagina-pdf canvas,
    .pagina-pdf-placeholder {
      max-width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      border-radius: 4px;
      transition: box-shadow 0.18s, outline-color 0.18s;
      display: block;
    }
    .pagina-pdf-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f6f2;
      color: #9b998f;
      font-size: 0.82rem;
    }
    .pagina-pdf.lida canvas {
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.35), 0 2px 8px rgba(0,0,0,0.15);
    }
    .pagina-pdf.ignorada canvas,
    .pagina-pdf.ignorada .pagina-pdf-placeholder {
      box-shadow: 0 0 0 2px rgba(160, 160, 160, 0.22), 0 2px 8px rgba(0,0,0,0.15);
    }

    #carregando {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-size: 0.9rem;
      color: #888;
    }
    #rodapePagina {
      position: absolute;
      right: 16px;
      bottom: 16px;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(26,26,24,0.78);
      color: #fff;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
      z-index: 20;
    }
    #rodapePagina input {
      width: 62px;
      padding: 4px 6px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      text-align: center;
      font-size: 0.78rem;
    }
    #rodapePagina input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.38);
    }
    #rodapePagina button {
      border: none;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.16);
      color: #fff;
      font-size: 0.74rem;
      cursor: pointer;
    }
    #btnMetaDaqui {
      background: rgba(76,175,80,0.22);
    }

    #painelSumario {
      position: absolute;
      inset: 0 auto 0 0;
      width: 300px;
      max-width: 85vw;
      background: rgba(255,255,255,0.98);
      border-right: 1px solid #e4e2da;
      box-shadow: 8px 0 22px rgba(0,0,0,0.08);
      display: none;
      flex-direction: column;
      z-index: 25;
    }
    #painelSumario.aberto {
      display: flex;
    }
    .sumario-topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #efede6;
    }
    .sumario-topo h2 {
      font-size: 0.92rem;
      font-weight: 600;
      color: #1a1a18;
    }
    .sumario-topo button {
      border: none;
      background: #f3f1eb;
      border-radius: 6px;
      padding: 6px 10px;
      color: #444;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #listaSumario {
      overflow: auto;
      padding: 10px 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .item-sumario {
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #2f2d29;
      font-size: 0.84rem;
      cursor: pointer;
    }
    .item-sumario:hover {
      background: #f3f1eb;
    }
    .item-sumario.nivel-1 { padding-left: 22px; }
    .item-sumario.nivel-2 { padding-left: 34px; }
    .item-sumario.nivel-3 { padding-left: 46px; }
  </style>
</head>
<body>
  <div class="barra">
    <h1 id="tituloLivro">Carregando…</h1>
    <div class="progresso-wrap">
      <div class="progresso-textos">
        <span id="textoProgresso">0 / ?</span>
        <span id="detalheProgresso"></span>
        <span id="indicadorContagem"></span>
      </div>
      <div class="barra-progresso" aria-hidden="true">
        <div class="barra-progresso-fill" id="fillProgresso" style="width:0%"></div>
      </div>
    </div>
    <div class="acoes-pdf" id="acoesPDF">
      <button id="btnToggleSumario" type="button">Sumário</button>
      <button id="btnZoomMenos" type="button">A-</button>
      <span id="textoZoomPDF">100%</span>
      <button id="btnZoomMais" type="button">A+</button>
    </div>
    <button id="btnConcluirReader" disabled>Meta não atingida</button>
  </div>

  <div id="areaLivro">
    <div id="carregando">⏳ Carregando livro…</div>
    <aside id="painelSumario">
      <div class="sumario-topo">
        <h2>Sumário</h2>
        <button id="btnFecharSumario" type="button">Fechar</button>
      </div>
      <div id="listaSumario"></div>
    </aside>

    <div id="viewerEpub" style="display:none;">
      <button class="nav-epub" id="btnAnterior">‹</button>
      <button class="nav-epub" id="btnProximo">›</button>
    </div>

    <div id="viewerPDF" style="display:none;"></div>
    <div id="rodapePagina">
      <span>Página</span>
      <input type="number" id="inputPaginaPDF" min="1" value="1">
      <span id="totalPaginasPDF">/ 0</span>
      <button id="btnIrPaginaPDF" type="button">Ir</button>
      <button id="btnMetaDaqui" type="button">Meta daqui</button>
    </div>
  </div>

  <script src="reader.js"></script>
</body>
</html>
